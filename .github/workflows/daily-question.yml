name: Daily citizenship question

on:
  schedule:
    # Every hour at :05. The script enforces the 9am–9pm AEST window and
    # only actually posts on the deterministic "lucky hour" of the day.
    - cron: "5 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force a post now (ignores hour/already-posted gates)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: daily-citizenship-question
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FORCE_SEND: ${{ github.event.inputs.force == 'true' && '1' || '' }}
        run: python bot.py

      - name: Commit updated state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update daily question state [skip ci]"
            git push
          else
            echo "No state changes to commit."
          fi
